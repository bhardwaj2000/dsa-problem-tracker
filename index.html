<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Track your DSA interview preparation with 164 curated LeetCode problems" />
    <title>DSA Problem Tracker</title>
    <style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  :root {
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    --font-mono: "SF Mono", Monaco, Consolas, monospace;
  }
  
  /* Light mode (default) */
  :root, [data-theme="light"] {
    --color-text-primary: #111827;
    --color-text-secondary: #6b7280;
    --color-text-tertiary: #9ca3af;
    --color-background-primary: #ffffff;
    --color-background-secondary: #f9fafb;
    --color-background-info: #eff6ff;
    --color-border-tertiary: rgba(0,0,0,0.08);
    --color-border-secondary: rgba(0,0,0,0.15);
  }
  
  /* Dark mode */
  [data-theme="dark"] {
    --color-text-primary: #f9fafb;
    --color-text-secondary: #d1d5db;
    --color-text-tertiary: #9ca3af;
    --color-background-primary: #1f2937;
    --color-background-secondary: #111827;
    --color-background-info: #1e3a5f;
    --color-border-tertiary: rgba(255,255,255,0.08);
    --color-border-secondary: rgba(255,255,255,0.15);
  }
  
  body { 
    font-family: var(--font-sans);
    background: #fafafa;
    transition: background-color 0.3s ease;
  }
  
  [data-theme="dark"] body {
    background: #0f172a;
  }
  
  /* Auto dark mode (fallback for browsers that support it) */
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --color-text-primary: #f9fafb;
      --color-text-secondary: #d1d5db;
      --color-text-tertiary: #9ca3af;
      --color-background-primary: #1f2937;
      --color-background-secondary: #111827;
      --color-background-info: #1e3a5f;
      --color-border-tertiary: rgba(255,255,255,0.08);
      --color-border-secondary: rgba(255,255,255,0.15);
    }
    :root:not([data-theme="light"]) body {
      background: #0f172a;
    }
  }
</style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.jsx"></script>
  </body>
</html>
